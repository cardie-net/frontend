<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardie Backend Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
        h2 { margin-top: 0; }
        .result { background: #f4f4f4; padding: 10px; white-space: pre-wrap; font-family: monospace; border: 1px solid #ddd; max-height: 300px; overflow-y: auto;}
        input, select, button { margin: 5px 0; padding: 8px; }
        .form-group { display: flex; flex-direction: column; max-width: 300px; }
    </style>
</head>
<body>
    <h1>Backend API Tester</h1>
    <p>Current Token: <span id="token-display">None</span></p>

    <section>
        <h2>1. Authentication</h2>
        
        <div style="display: flex; gap: 20px;">
            <div class="form-group">
                <h3>Guest Login</h3>
                <button onclick="loginGuest()">Login as Guest</button>
            </div>

            <div class="form-group">
                <h3>Register</h3>
                <input type="email" id="reg-email" placeholder="Email">
                <input type="password" id="reg-password" placeholder="Password">
                <button onclick="register()">Register</button>
            </div>

            <div class="form-group">
                <h3>Login</h3>
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-password" placeholder="Password">
                <button onclick="login()">Login</button>
            </div>
        </div>
    </section>

    <section>
        <h2>2. Decks</h2>
        
        <div style="display: flex; gap: 20px;">
            <div class="form-group">
                <h3>Create Deck</h3>
                <input type="text" id="deck-name" placeholder="Name">
                <input type="text" id="deck-slug" placeholder="Slug">
                <select id="deck-privacy">
                    <option value="private">Private</option>
                    <option value="unlisted">Unlisted</option>
                    <option value="public">Public</option>
                </select>
                <button onclick="createDeck()">Create Deck</button>
            </div>

            <div class="form-group">
                <h3>List My Decks</h3>
                <button onclick="listDecks()">Get Decks</button>
            </div>
        </div>
    </section>

    <section>
        <h2>3. Cards</h2>
        
        <div style="display: flex; gap: 20px;">
            <div class="form-group">
                <h3>Create Card</h3>
                <input type="number" id="card-deck-id" placeholder="Deck ID">
                <input type="text" id="card-front" placeholder="Front Text">
                <input type="text" id="card-back" placeholder="Back Text">
                <button onclick="createCard()">Create Card</button>
            </div>

            <div class="form-group">
                <h3>List Cards for Deck</h3>
                <input type="number" id="list-card-deck-id" placeholder="Deck ID">
                <button onclick="listCards()">Get Cards</button>
            </div>
        </div>
    </section>

    <section>
        <h2>Response</h2>
        <div class="result" id="output">No request made yet.</div>
    </section>

    <script src="app.js"></script>
</body>
</html>
